name: Build desktop applications

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            os: ubuntu-latest
            platform: linux/amd64
            artifact: erdsketch-linux-amd64
            build_tags: desktop,webkit2_41
          - name: Windows amd64
            os: windows-latest
            platform: windows/amd64
            artifact: erdsketch-windows-amd64
            build_tags: desktop
          - name: macOS universal
            os: macos-latest
            platform: darwin/universal
            artifact: erdsketch-macos-universal
            build_tags: desktop
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - name: Install frontend dependencies
        run: npm ci
      - name: Build desktop application
        working-directory: desktop
        shell: bash
        run: wails build -clean -platform "${{ matrix.platform }}" -tags "${{ matrix.build_tags }}"
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: desktop/build/bin/**
          if-no-files-found: error
